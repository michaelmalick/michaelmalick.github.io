      </button>
      <button data-set-theme="dark" type="button" aria-label="Dark mode" aria-pressed="false">

      </button>
    </div>
  </div>
</div>

<script>
  (function () {
    var buttons = document.querySelectorAll('.theme-toggle button');
    function sync() {
      var current = document.documentElement.dataset.theme;
      buttons.forEach(function (b) {
        b.setAttribute('aria-pressed', b.dataset.setTheme === current ? 'true' : 'false');
      });
    }
    buttons.forEach(function (b) {
      b.addEventListener('click', function () {
        var next = b.dataset.setTheme;
        document.documentElement.dataset.theme = next;
        try { localStorage.setItem('theme', next); } catch (e) {}
        sync();
      });
    });
    sync();
  })();
</script>
