{{ define "main" }}
{{ range .Pages.ByDate.Reverse }}
<article>
  <h2>
    <a href="{{ .RelPermalink }}">{{ .Title }}</a>
  </h2>
  <a href="{{ .RelPermalink }}" class="img_research_link">
    <img src="/research/{{ .Params.image }}" class="img_research"
         alt="{{ .Title }}" loading="lazy">
  </a>
  <div class="research_body">
    {{ .Summary }}
  </div>
</article>
{{ end }}
{{ end }}
