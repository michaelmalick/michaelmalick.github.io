{{ define "main" }}
{{ range .Pages.ByDate.Reverse }}
<article>
  <a href="{{ .RelPermalink }}">
    <img src="/research/{{ .Params.image }}" class="img_research"
         alt="{{ .Title }}" loading="lazy">
  </a>
  <h2>
    <a href="{{ .RelPermalink }}">{{ .Title }}</a>
  </h2>
  {{ .Summary }}
</article>
{{ end }}
{{ end }}
